<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auxeira — Evidence Risk Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F5F0E8;padding:1.5rem;color:#1A1A2A;max-width:700px;margin:0 auto;font-size:14px}
h1,h2,h3{font-weight:700}
.navy{background:#0A1628;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;color:#F5F0E8}
.card{border:0.5px solid #DDDDDD;border-radius:12px;padding:1.25rem;margin-bottom:1rem;background:#FFF}
.gold-card{background:#FDF8EE;border:1px solid #C9A84C;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700;color:#C9A84C;margin-bottom:8px}
.proj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.proj-card{border-radius:8px;padding:10px 12px;border:0.5px solid}
.score-ring{width:84px;height:84px;border-radius:50%;border:3px solid #C9A84C;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.grade-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:6px}
.btn-gold{background:#C9A84C;color:#0A1628;border:none;padding:13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px}
.btn-ghost{background:transparent;color:#666;border:0.5px solid #BBB;padding:11px;border-radius:8px;font-size:12px;cursor:pointer;width:100%;margin-bottom:6px}
.risk-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #EEE}
.risk-row:last-child{border-bottom:none;padding-bottom:0}
.risk-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid #EEE;font-size:12px}
.metric-row:last-child{border-bottom:none}
.insight-line{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid #EEE;font-size:12px;line-height:1.5}
.insight-line:last-child{border-bottom:none}
.dot{width:6px;height:6px;border-radius:50%;background:#C9A84C;flex-shrink:0;margin-top:5px}
.chart-wrap{position:relative;height:180px;margin:0.75rem 0}
.assumption-note{font-size:10px;color:#999;font-style:italic;margin-top:6px}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:#E8F4FD;color:#1A6BA0;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.guardrail-note{font-size:10px;color:#999;margin-top:8px;padding-top:8px;border-top:0.5px solid #EEE}
.demo-bar{background:#E8E8E8;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#555;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.mini-stat{background:#F5F5F5;border-radius:8px;padding:10px;text-align:center}
</style>
</head>
<body>

<div class="demo-bar">
  <strong style="color:#1A1A2A">Demo controls:</strong>
  Score: <input type="range" min="0" max="100" value="58" id="ss" oninput="upd(this.value)" style="flex:1;min-width:80px">
  <strong id="sv" style="color:#C9A84C;min-width:30px">58</strong>
  Budget:
  <select id="bs" onchange="fullRender()" style="font-size:12px;padding:3px 6px">
    <option value="1">Under R5M</option>
    <option value="2" selected>R5M–R20M</option>
    <option value="3">R20M–R100M</option>
    <option value="4">Over R100M</option>
  </select>
  Sector:
  <select id="sec" onchange="fullRender()" style="font-size:12px;padding:3px 6px">
    <option value="ecd">ECD / Education</option>
    <option value="health">Health</option>
    <option value="econ">Economic Dev</option>
    <option value="other">Other</option>
  </select>
</div>

<div id="main"></div>

<script>
let score=58;
let survivalChart=null, counterfactualChart=null;

const BANDS=[
  {min:75,max:100,label:'Strong foundation',grade:'Strong',gc:'#1D9E75',gb:'rgba(29,158,117,0.12)',hl:'Your evidence is strong. Your gap is translation.',rl:'Low',surv:85},
  {min:50,max:74,label:'Solid base, significant gap',grade:'Moderate',gc:'#C9A84C',gb:'rgba(201,168,76,0.15)',hl:'You have more evidence than you think. It\'s not working hard enough.',rl:'Medium',surv:60},
  {min:25,max:49,label:'Significant gaps — urgent',grade:'Needs attention',gc:'#D85A30',gb:'rgba(216,90,48,0.12)',hl:'Your evidence gaps are likely costing you funding and policy traction right now.',rl:'High',surv:35},
  {min:0,max:24,label:'Critical gaps',grade:'Critical',gc:'#E24B4A',gb:'rgba(226,75,74,0.12)',hl:'Critical evidence gaps. Important decisions are being made without your story.',rl:'Critical',surv:15}
];

const PROJ={
  1:{fund:'R500K–R2M',inf:'25–40%',opp:'R1–3M over 3 years',scale:'R5M+',base:2,improved:6},
  2:{fund:'R2M–R8M',inf:'30–45%',opp:'R5–15M over 3 years',scale:'R15M+',base:5,improved:18},
  3:{fund:'R8M–R25M',inf:'35–50%',opp:'R15–40M over 3 years',scale:'R40M+',base:15,improved:50},
  4:{fund:'R25M–R80M',inf:'40–60%',opp:'R50M+ over 3 years',scale:'Portfolio-level',base:40,improved:130}
};

const RISKS={
  low:['Translation polish — strong evidence base, but audience-specific framing can be sharpened further.','Economic narrative — the full fiscal return of your programme may not yet be fully quantified.','Funder language — the gap between your evidence quality and funding success can still be closed.'],
  med:['Partial economic framing — SROI or fiscal impact data exists but isn\'t being maximised in funder conversations.','Translation gap — evidence reaches funders but isn\'t converting to decisions at the rate it should.','Sector positioning — the economic case for your work hasn\'t been made at Treasury or policy level.'],
  high:['Weak economic framing — likely difficulty securing large Treasury allocations or government co-funding.','Low persuasiveness — funder proposals may be deprioritised in competitive funding rounds.','Poor audience alignment — policy influence remains limited despite strong programme delivery.']
};

const SECTOR_CONTEXT={
  ecd:'South Africa\'s ECD sector is undergoing a major funding shift — R10B Bana Pele commitments require economic impact evidence, not just child outcome data. Organisations that cannot demonstrate fiscal return are increasingly at risk of being deprioritised.',
  health:'Global health funders (Gavi, Global Fund, Gates) are tightening evidence requirements post-COVID. South African health organisations without strong M&E frameworks and economic framing are losing ground to organisations that can demonstrate cost-per-outcome.',
  econ:'Economic development funders in South Africa are shifting toward enterprise-level SROI and job creation data. Micro-enterprise support organisations without fiscal multiplier evidence face increasing competition for a narrowing pool of government co-funding.',
  other:'Social impact funders globally are moving toward evidence-weighted portfolio allocation. Organisations without strong evidence communication frameworks are structurally disadvantaged in competitive funding environments.'
};

const AI_FALLBACK='Based on sector benchmarks, organisations with similar evidence maturity profiles typically secure an estimated 30–40% less funding than sector leaders with strong economic framing. Improving evidence communication is estimated to unlock 2–3× more decision-maker engagement within 24 months — based on patterns across South Africa\'s social impact funding landscape.';

function getBand(s){return BANDS.find(b=>s>=b.min&&s<=b.max)||BANDS[3];}
function getProj(){return PROJ[parseInt(document.getElementById('bs').value||2)];}
function getSec(){return document.getElementById('sec').value||'ecd';}
function getRiskLevel(band){return band.rl==='Low'?'low':band.rl==='Medium'?'med':'high';}
function scColor(s){return s>=75?'#1D9E75':s>=50?'#C9A84C':s>=25?'#D85A30':'#E24B4A';}

function upd(v){score=parseInt(v);document.getElementById('sv').textContent=v;fullRender();}

function generateSurvivalData(band){
  const base=band.surv/100;
  const improved=Math.min(0.92,(band.surv+25)/100);
  const months=[0,6,12,18,24,30,36];
  const decay=0.018, idecay=0.005;
  return{
    labels:months.map(m=>m===0?'Now':`${m}m`),
    current:months.map(m=>Math.max(0.05,base-decay*m+(Math.random()*0.01-0.005)).toFixed(2)*100),
    improved:months.map(m=>Math.min(0.97,improved-idecay*m+(Math.random()*0.01-0.005)).toFixed(2)*100)
  };
}

function generateCounterfactual(proj){
  return{
    labels:['Year 1','Year 2','Year 3'],
    without:[proj.base, proj.base*0.85, proj.base*0.72],
    with:[proj.base*1.3, proj.improved*0.65, proj.improved]
  };
}

function buildSurvivalChart(data){
  const ctx=document.getElementById('survivalChart');
  if(!ctx)return;
  if(survivalChart)survivalChart.destroy();
  survivalChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:data.labels,
      datasets:[
        {label:'Current trajectory',data:data.current,borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,0.05)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#E24B4A',tension:0.3,fill:true},
        {label:'With evidence improvement',data:data.improved,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#1D9E75',tension:0.3,fill:true,borderDash:[]}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:12}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ~${Math.round(ctx.raw)}% probability`}}
      },
      scales:{
        y:{min:0,max:100,ticks:{callback:v=>`${v}%`,font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'},title:{display:true,text:'Funding stability probability',font:{size:10},color:'#999'}},
        x:{grid:{display:false},ticks:{font:{size:10}}}
      }
    }
  });
}

function buildCounterfactualChart(data,proj){
  const ctx=document.getElementById('counterfactualChart');
  if(!ctx)return;
  if(counterfactualChart)counterfactualChart.destroy();
  counterfactualChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:data.labels,
      datasets:[
        {label:'Without action',data:data.without,backgroundColor:'rgba(226,75,74,0.7)',borderRadius:4,borderSkipped:false},
        {label:'With Auxeira',data:data.with,backgroundColor:'rgba(29,158,117,0.75)',borderRadius:4,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{size:11},boxWidth:12,padding:12}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: R${Math.round(ctx.raw)}M (estimated)`}}
      },
      scales:{
        y:{ticks:{callback:v=>`R${v}M`,font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'},title:{display:true,text:'Estimated funding secured (Rm)',font:{size:10},color:'#999'}},
        x:{grid:{display:false},ticks:{font:{size:10}}}
      }
    }
  });
}

async function fetchAIInsight(band,sector,survProb){
  const sectorCtx=SECTOR_CONTEXT[sector];
  const prompt=`You are Auxeira's evidence risk analyst. Generate a competitive landscape insight for a South African social sector organisation.

Evidence score: ${score}/100
Score band: ${band.label}
Sector: ${sector}
Estimated 36-month funding stability: ~${survProb}%
Sector context: ${sectorCtx}

HARD RULES — if you cannot follow all rules, return only the text "USE_FALLBACK":
1. Use ranges not point estimates (e.g. "30–40%" not "35%")
2. Label claims as "based on sector benchmarks" or "estimated"
3. No specific legal or financial advice
4. Maximum 2 sentences only
5. Do not name specific competitor organisations
6. Do not claim Auxeira has data it doesn't have
7. Frame all projections as illustrative

Return 2 sentences only. No preamble.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:120,
        system:'You are a strict evidence risk analyst. Follow all rules exactly or return USE_FALLBACK.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const d=await res.json();
    const text=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(!text||text.includes('USE_FALLBACK')||(!text.includes('estimated')&&!text.includes('based on')&&!text.includes('%'))){
      return{text:AI_FALLBACK,source:'fallback'};
    }
    return{text,source:'ai'};
  }catch(e){
    return{text:AI_FALLBACK,source:'fallback'};
  }
}

async function fullRender(){
  const band=getBand(score);
  const proj=getProj();
  const sec=getSec();
  const col=scColor(score);
  const riskLevel=getRiskLevel(band);
  const risks=RISKS[riskLevel];
  const survData=generateSurvivalData(band);
  const cfData=generateCounterfactual(proj);
  const survProb=band.surv;

  document.getElementById('main').innerHTML=`

  <div class="navy">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:1.25rem;align-items:center;margin-bottom:1rem">
      <div class="score-ring"><div style="font-size:26px;font-weight:700;color:#C9A84C">${score}</div><div style="font-size:10px;color:rgba(245,240,232,0.4)">/100</div></div>
      <div>
        <span class="grade-badge" style="background:${band.gb};color:${band.gc}">${band.grade} &nbsp;·&nbsp; ${band.rl} risk</span>
        <div style="font-size:14px;font-weight:700;color:#F5F0E8;line-height:1.4;margin-bottom:4px">${band.hl}</div>
        <div style="font-size:11px;color:rgba(245,240,232,0.5)">${band.label}</div>
      </div>
    </div>
    <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden">
      <div style="height:6px;width:${score}%;background:${col};border-radius:3px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:10px;color:rgba(245,240,232,0.25)">Critical (0)</span>
      <span style="font-size:10px;color:rgba(245,240,232,0.25)">Strong (100)</span>
    </div>
  </div>

  <div class="label">Key projections</div>
  <div class="proj-grid">
    <div class="proj-card" style="border-color:rgba(226,75,74,0.35);background:rgba(226,75,74,0.05)">
      <div style="font-size:10px;color:#E24B4A;font-weight:700;text-transform:uppercase;margin-bottom:4px">Funding at risk</div>
      <div style="font-size:16px;font-weight:700;color:#1A1A2A;margin-bottom:3px">${proj.fund}</div>
      <div style="font-size:11px;color:#666">annually — current evidence maturity</div>
    </div>
    <div class="proj-card" style="border-color:rgba(216,90,48,0.35);background:rgba(216,90,48,0.05)">
      <div style="font-size:10px;color:#D85A30;font-weight:700;text-transform:uppercase;margin-bottom:4px">Influence gap</div>
      <div style="font-size:16px;font-weight:700;color:#1A1A2A;margin-bottom:3px">${proj.inf}</div>
      <div style="font-size:11px;color:#666">potential impact not reaching decision-makers</div>
    </div>
    <div class="proj-card" style="border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.07)">
      <div style="font-size:10px;color:#8B6914;font-weight:700;text-transform:uppercase;margin-bottom:4px">Opportunity cost</div>
      <div style="font-size:16px;font-weight:700;color:#1A1A2A;margin-bottom:3px">${proj.opp}</div>
      <div style="font-size:11px;color:#666">in reachable funding left on the table</div>
    </div>
  </div>

  <div class="card">
    <div class="label">Funding survival analysis</div>
    <div style="font-size:12px;color:#555;margin-bottom:8px;line-height:1.55">Estimated probability of maintaining current funding levels over 36 months — comparing your current evidence trajectory against an evidence-improved scenario. Based on actuarial modelling using sector funding benchmarks.</div>
    <div class="two-col" style="margin-bottom:10px">
      <div class="mini-stat">
        <div style="font-size:10px;color:#999;margin-bottom:3px">Current path — 36 month survival</div>
        <div style="font-size:20px;font-weight:700;color:#E24B4A">~${survProb}%</div>
        <div style="font-size:10px;color:#999">probability of funding stability</div>
      </div>
      <div class="mini-stat">
        <div style="font-size:10px;color:#999;margin-bottom:3px">With evidence improvement</div>
        <div style="font-size:20px;font-weight:700;color:#1D9E75">~${Math.min(92,survProb+25)}%</div>
        <div style="font-size:10px;color:#999">estimated probability</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="survivalChart"></canvas></div>
    <p class="assumption-note">Estimated using sector-level funding stability data. Assumes no significant external funding landscape changes. Illustrative — not a guarantee of outcome.</p>
  </div>

  <div class="card">
    <div class="label">Counterfactual — 3-year funding divergence</div>
    <div style="font-size:12px;color:#555;margin-bottom:8px;line-height:1.55">Estimated cumulative funding secured over three years — comparing your current evidence trajectory (without action) against an evidence-improved scenario (with Auxeira). The gap between the two bars is your recoverable opportunity.</div>
    <div class="chart-wrap"><canvas id="counterfactualChart"></canvas></div>
    <div style="background:#F0F9F4;border-radius:8px;padding:10px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:#999;margin-bottom:2px">Estimated 3-year funding gap</div>
        <div style="font-size:18px;font-weight:700;color:#1D9E75">R${Math.round(proj.improved - proj.base*0.72)}M+</div>
      </div>
      <div style="font-size:11px;color:#1D9E75;font-weight:700;text-align:right">recoverable with<br>evidence improvement</div>
    </div>
    <p class="assumption-note">All figures estimated and illustrative. Based on sector funding benchmarks and evidence quality correlations across South Africa's social impact sector.</p>
  </div>

  <div class="card">
    <div class="label">Top 3 risks</div>
    <div class="risk-row"><div class="risk-num" style="background:rgba(226,75,74,0.12);color:#E24B4A">1</div><div><div style="font-size:12px;font-weight:700;color:#1A1A2A;margin-bottom:3px">Risk 1</div><div style="font-size:12px;color:#555;line-height:1.55">${risks[0]}</div></div></div>
    <div class="risk-row"><div class="risk-num" style="background:rgba(216,90,48,0.12);color:#D85A30">2</div><div><div style="font-size:12px;font-weight:700;color:#1A1A2A;margin-bottom:3px">Risk 2</div><div style="font-size:12px;color:#555;line-height:1.55">${risks[1]}</div></div></div>
    <div class="risk-row"><div class="risk-num" style="background:rgba(201,168,76,0.12);color:#8B6914">3</div><div><div style="font-size:12px;font-weight:700;color:#1A1A2A;margin-bottom:3px">Risk 3</div><div style="font-size:12px;color:#555;line-height:1.55">${risks[2]}</div></div></div>
  </div>

  <div class="card">
    <div class="label">Market context — ${sec.toUpperCase()} sector</div>
    <div style="font-size:12px;color:#555;line-height:1.65;margin-bottom:10px">${SECTOR_CONTEXT[sec]}</div>
    <div class="metric-row"><span style="color:#666">Orgs with strong SROI framing</span><span style="font-weight:700;color:#1D9E75">3.3× more likely to secure co-funding</span></div>
    <div class="metric-row"><span style="color:#666">Treasury proposals without economic case</span><span style="font-weight:700;color:#E24B4A">Deprioritised ~70% of cases</span></div>
    <div class="metric-row"><span style="color:#666">Sector evidence translation gap (avg)</span><span style="font-weight:700;color:#D85A30">R5M–R15M annual opportunity cost</span></div>
    <div style="font-size:10px;color:#999;margin-top:8px;font-style:italic">Based on public sector funding data. Percentile rankings available once Auxeira has assessed 20+ organisations in your sector.</div>
  </div>

  <div class="card" id="aiInsightCard">
    <div class="label">AI competitive insight</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <span class="ai-badge">⟳ Generating...</span>
    </div>
    <div id="aiText" style="font-size:12px;color:#555;line-height:1.65;font-style:italic">Analysing your sector and evidence profile...</div>
    <div class="guardrail-note">Generated by Claude AI with strict guardrails — all projections are estimated ranges based on sector benchmarks, not specific forecasts. No legal or financial advice.</div>
  </div>

  <div class="card">
    <div class="label">Growth & scale potential</div>
    <div style="font-size:12px;color:#1A1A2A;line-height:1.65;margin-bottom:10px">Organisations that close their evidence translation gap typically unlock <strong>2–3× more decision-maker engagement</strong> within 24 months — estimated from patterns across South Africa's social impact sector. For your budget profile, that translates to an estimated <strong>${proj.scale}</strong> in additional funding capacity.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
      ${['6 months','12 months','24 months'].map((t,i)=>`<div class="mini-stat"><div style="font-size:10px;color:#999;margin-bottom:3px">${t}</div><div style="font-size:11px;font-weight:700;color:#1A1A2A">${['Gaps closed','Narratives deployed','Scale unlocked'][i]}</div></div>`).join('')}
    </div>
  </div>

  <div class="gold-card">
    <div style="font-size:13px;font-weight:700;color:#8B6914;margin-bottom:8px">The honest truth</div>
    <div style="font-size:13px;color:#6B4F0A;line-height:1.7;margin-bottom:10px">The evidence gap you have today is quietly costing your organisation influence, funding, and impact. Every funding round without a fiscal impact narrative, every policy window without an economic case, every funder conversation without an SROI — these have a cumulative cost that compounds over time. The good news is this is fixable. Auxeira fixes it in weeks, not years.</div>
    <div style="font-size:12px;color:#8B6914;font-style:italic">"The question isn't whether you can afford Auxeira. It's what a misallocated funding round, a missed policy window, or an unseen SROI is costing you right now."</div>
  </div>

  <button class="btn-gold">Ready to close these gaps? Book your Evidence Strategy Call</button>
  <button class="btn-ghost">Download the Auxeira Capability Overview</button>
  <div style="text-align:center;margin-top:8px;font-size:11px;color:#999">30 minutes. Free. No pitch. &nbsp;·&nbsp; info@auxeira.com</div>
  `;

  setTimeout(()=>{
    buildSurvivalChart(survData);
    buildCounterfactualChart(cfData,proj);
  },100);

  fetchAIInsight(band,sec,survProb).then(result=>{
    const card=document.getElementById('aiInsightCard');
    if(!card)return;
    const badge=card.querySelector('.ai-badge');
    const text=document.getElementById('aiText');
    if(badge) badge.innerHTML=result.source==='ai'?'✦ AI-generated insight':'✦ Sector benchmark insight';
    if(badge) badge.style.background=result.source==='ai'?'#E8F4FD':'#FDF8EE';
    if(badge) badge.style.color=result.source==='ai'?'#1A6BA0':'#8B6914';
    if(text){text.textContent=result.text;text.style.fontStyle='normal';}
  });
}

fullRender();
</script>
