version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - |
          python3 -c "
          import subprocess, json, os
          keys = ['ZEPTOMAIL_TOKEN','ANTHROPIC_API_KEY','XAI_API_KEY',
                  'DYNAMODB_LEADS_TABLE','DYNAMODB_HEALTH_CHECK_TABLE',
                  'DYNAMODB_TOPIC_BANK_TABLE','LEAD_NOTIFICATION_EMAIL','CAPABILITY_PDF_URL',
                  'NEXT_PUBLIC_CALENDLY_URL','NEXT_PUBLIC_SITE_URL']
          secrets = {}
          for k in keys:
              r = subprocess.run(['aws','ssm','get-parameter','--region','us-east-1',
                                  '--name',f'/auxeira/{k}','--with-decryption',
                                  '--query','Parameter.Value','--output','text'],
                                 capture_output=True, text=True)
              if r.returncode == 0:
                  secrets[k] = r.stdout.strip()
                  print(f'[config] {k} = ***')
              else:
                  print(f'[config] MISSING {k}:', r.stderr.strip())
          with open('lib/secrets.json','w') as f:
              json.dump(secrets, f)
          print('[config] secrets.json written with', len(secrets), 'keys')
          "
        - npm run build
        - mkdir -p .next/server/lib
        - cp lib/secrets.json .next/server/lib/secrets.json
        - echo "[config] secrets.json copied to .next/server/lib/"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
