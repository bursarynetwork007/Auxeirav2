version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - export ZEPTOMAIL_TOKEN=$(aws ssm get-parameter --region us-east-1 --name /auxeira/ZEPTOMAIL_TOKEN --with-decryption --query Parameter.Value --output text)
        - export ANTHROPIC_API_KEY=$(aws ssm get-parameter --region us-east-1 --name /auxeira/ANTHROPIC_API_KEY --with-decryption --query Parameter.Value --output text)
        - export XAI_API_KEY=$(aws ssm get-parameter --region us-east-1 --name /auxeira/XAI_API_KEY --with-decryption --query Parameter.Value --output text)
        - export MANUS_API_KEY=$(aws ssm get-parameter --region us-east-1 --name /auxeira/MANUS_API_KEY --with-decryption --query Parameter.Value --output text)
        - export DYNAMODB_LEADS_TABLE=$(aws ssm get-parameter --region us-east-1 --name /auxeira/DYNAMODB_LEADS_TABLE --query Parameter.Value --output text)
        - export DYNAMODB_HEALTH_CHECK_TABLE=$(aws ssm get-parameter --region us-east-1 --name /auxeira/DYNAMODB_HEALTH_CHECK_TABLE --query Parameter.Value --output text)
        - export DYNAMODB_TOPIC_BANK_TABLE=$(aws ssm get-parameter --region us-east-1 --name /auxeira/DYNAMODB_TOPIC_BANK_TABLE --query Parameter.Value --output text)
        - export MANUS_API_ENDPOINT=$(aws ssm get-parameter --region us-east-1 --name /auxeira/MANUS_API_ENDPOINT --query Parameter.Value --output text)
        - export LEAD_NOTIFICATION_EMAIL=$(aws ssm get-parameter --region us-east-1 --name /auxeira/LEAD_NOTIFICATION_EMAIL --query Parameter.Value --output text)
        - export NEXT_PUBLIC_CALENDLY_URL=$(aws ssm get-parameter --region us-east-1 --name /auxeira/NEXT_PUBLIC_CALENDLY_URL --query Parameter.Value --output text)
        - export NEXT_PUBLIC_SITE_URL=$(aws ssm get-parameter --region us-east-1 --name /auxeira/NEXT_PUBLIC_SITE_URL --query Parameter.Value --output text)
        - printenv | grep -E "ZEPTOMAIL|MANUS|ANTHROPIC|XAI|DYNAMODB" | sed 's/=.*/=***/' 
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
